apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: mediconnect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: mediconnect-notification-service:latest
          ports:
            - containerPort: 5006
          env:
            - name: PORT
              value: "5006"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: NODE_ENV
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: NOTIFICATION_DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: NOTIFICATION_DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mediconnect-secrets
                  key: DB_PASSWORD
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: mediconnect-secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: mediconnect-secrets
                  key: SMTP_PASS
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: mediconnect-secrets
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mediconnect-secrets
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: mediconnect-secrets
                  key: TWILIO_PHONE_NUMBER
