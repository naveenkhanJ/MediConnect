apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mediconnect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: mediconnect-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: FRONTEND_API_URL
