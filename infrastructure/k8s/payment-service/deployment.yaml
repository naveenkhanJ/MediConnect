apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: mediconnect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: YOUR_DOCKERHUB_USERNAME/mediconnect-payment-service:latest
          ports:
            - containerPort: 5004
          env:
            - name: PORT
              value: "5004"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: NODE_ENV
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: PAYMENT_DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: PAYMENT_DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mediconnect-secrets
                  key: DB_PASSWORD
            - name: APPOINTMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: APPOINTMENT_SERVICE_URL
            - name: PAYHERE_MERCHANT_ID
              valueFrom:
                secretKeyRef:
                  name: mediconnect-secrets
                  key: PAYHERE_MERCHANT_ID
            - name: PAYHERE_MERCHANT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mediconnect-secrets
                  key: PAYHERE_MERCHANT_SECRET
            - name: PAYHERE_RETURN_URL
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: PAYHERE_RETURN_URL
            - name: PAYHERE_CANCEL_URL
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: PAYHERE_CANCEL_URL
