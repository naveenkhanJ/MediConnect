apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: patient-db-pvc
  namespace: mediconnect
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-db
  namespace: mediconnect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-db
  template:
    metadata:
      labels:
        app: patient-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: PATIENT_DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: mediconnect-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mediconnect-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: patient-db-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: patient-db-storage
          persistentVolumeClaim:
            claimName: patient-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: patient-db
  namespace: mediconnect
spec:
  selector:
    app: patient-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
