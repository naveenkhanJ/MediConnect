version: "3.8"

# ─────────────────────────────────────────────────────────────
#  MediConnect — Unified docker-compose
# ─────────────────────────────────────────────────────────────

services:

  # ── Databases ──────────────────────────────────────────────

  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5435:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - mediconnect-net

  patient-db:
    image: postgres:15-alpine
    container_name: patient-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5436:5432"
    volumes:
      - patient_db_data:/var/lib/postgresql/data
    networks:
      - mediconnect-net

  doctor-db:
    image: postgres:15-alpine
    container_name: doctor-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: doctor_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5437:5432"
    volumes:
      - doctor_db_data:/var/lib/postgresql/data
    networks:
      - mediconnect-net

  appointment-db:
    image: postgres:15-alpine
    container_name: appointment-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: appointment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - appointment_db_data:/var/lib/postgresql/data
    networks:
      - mediconnect-net

  payment-db:
    image: postgres:15-alpine
    container_name: payment-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5434:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    networks:
      - mediconnect-net

  notification-db:
    image: postgres:15-alpine
    container_name: notification-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5438:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    networks:
      - mediconnect-net

  telemedicine-db:
    image: postgres:15-alpine
    container_name: telemedicine-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: telemedicine_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5439:5432"
    volumes:
      - telemedicine_db_data:/var/lib/postgresql/data
    networks:
      - mediconnect-net

  # ── Services ───────────────────────────────────────────────

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: your_secret_key
      INTERNAL_SECRET: mediconnect-internal
    depends_on:
      - auth-db
    networks:
      - mediconnect-net

  patient-service:
    build: ./services/patient-service/backend
    container_name: patient-service
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      DB_HOST: patient-db
      DB_PORT: 5432
      DB_NAME: patient_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: your_secret_key
      INTERNAL_SECRET: mediconnect-internal
    depends_on:
      - patient-db
    networks:
      - mediconnect-net

  doctor-service:
    build: ./services/doctor-service
    container_name: doctor-service
    ports:
      - "5009:5009"
    environment:
      PORT: 5009
      DB_HOST: doctor-db
      DB_PORT: 5432
      DB_NAME: doctor_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      INTERNAL_SECRET: mediconnect-internal
      APPOINTMENT_SERVICE_URL: http://appointment-service:5003
    depends_on:
      - doctor-db
    networks:
      - mediconnect-net

  appointment-service:
    build: ./services/appointment-service
    container_name: appointment-service
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
      DB_HOST: appointment-db
      DB_PORT: 5432
      DB_NAME: appointment_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      PAYMENT_SERVICE_URL: http://payment-service:5004
      PATIENT_SERVICE_URL: http://patient-service:5002
      DOCTOR_SERVICE_URL: http://doctor-service:5009
      NOTIFICATION_SERVICE_URL: http://notification-service:5006
      INTERNAL_SECRET: mediconnect-internal
    depends_on:
      - appointment-db
    networks:
      - mediconnect-net

  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    ports:
      - "5004:5004"
    environment:
      PORT: 5004
      DB_HOST: payment-db
      DB_PORT: 5432
      DB_NAME: payment_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      APPOINTMENT_SERVICE_URL: http://appointment-service:5003
      PAYHERE_MERCHANT_ID: ${PAYHERE_MERCHANT_ID:-1235163}
      PAYHERE_MERCHANT_SECRET: ${PAYHERE_MERCHANT_SECRET:-ODEwOTA3NTU5NzQ1OTYyMTkwOTI1NzMyNzAwMjU3NDE3ODgwOA==}
    depends_on:
      - payment-db
    networks:
      - mediconnect-net

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    ports:
      - "5006:5006"
    environment:
      PORT: 5006
      DB_HOST: notification-db
      DB_PORT: 5432
      DB_NAME: notification_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    depends_on:
      - notification-db
    networks:
      - mediconnect-net

  telemedicine-service:
    build: ./services/telemedicine-service
    container_name: telemedicine-service
    ports:
      - "5005:5005"
    environment:
      PORT: 5005
      DB_HOST: telemedicine-db
      DB_PORT: 5432
      DB_NAME: telemedicine_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      APPOINTMENT_SERVICE_URL: http://appointment-service:5003/api
      NOTIFICATION_SERVICE_URL: http://notification-service:5006/api/v1
    depends_on:
      - telemedicine-db
    networks:
      - mediconnect-net

  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:5000
      PATIENT_SERVICE_URL: http://patient-service:5002
      DOCTOR_SERVICE_URL: http://doctor-service:5009
      APPOINTMENT_SERVICE_URL: http://appointment-service:5003
      PAYMENT_SERVICE_URL: http://payment-service:5004
      NOTIFICATION_SERVICE_URL: http://notification-service:5006
    depends_on:
      - auth-service
      - patient-service
      - appointment-service
    networks:
      - mediconnect-net

  frontend:
    build: ./frontend/mediconnect
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api-gateway
    networks:
      - mediconnect-net

# ── Volumes & Networks ─────────────────────────────────────

volumes:
  auth_db_data:
  patient_db_data:
  doctor_db_data:
  appointment_db_data:
  payment_db_data:
  notification_db_data:
  telemedicine_db_data:

networks:
  mediconnect-net:
    driver: bridge
